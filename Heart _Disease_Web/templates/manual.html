<!DOCTYPE html>
<html lang="en">
<head>
  <title>Manual Prediction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #2e7d32, #ff9800); /* Green to Orange */
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      animation: fadeIn 1s ease;
    }

    .navbar {
      background-color: #1b5e20; /* Dark green */
      padding: 1rem;
    }

    label {
      font-weight: 500;
      color: #fff;
    }

    .form-control, .form-select {
      border-radius: 6px;
    }

    .btn-primary {
      background-color: #43a047; /* Medium Green */
      border: none;
    }

    .btn-primary:hover {
      background-color: #2e7d32; /* Darker Green */
    }

    .btn-secondary {
      background-color: #ef6c00; /* Orange */
      border: none;
    }

    .btn-secondary:hover {
      background-color: #e65100; /* Darker Orange */
    }

    .alert-info {
      background-color: #c8e6c9; /* Light green */
      color: #1b5e20;
      border-color: #a5d6a7;
    }

    ul li {
      color: #fff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark justify-content-end">
    <a href="/logout" class="btn btn-danger me-3">Logout</a>
  </nav>

  <div class="container mt-4">
    <h3 class="text-center mb-4">🧠 Manual Heart Disease Prediction</h3>
    <form method="POST" class="row g-3">

      <div class="col-md-4">
        <label>Age (in years)</label>
        <input type="number" name="age" class="form-control" required>
      </div>

      <div class="col-md-4">
        <label>Sex</label>
        <select class="form-select" name="sex">
          <option value="1">1 = Male</option>
          <option value="0">0 = Female</option>
        </select>
      </div>

      <div class="col-md-4">
        <label>Chest Pain Type</label>
        <select class="form-select" name="cp">
          <option value="0">0 = Typical Angina</option>
          <option value="1">1 = Atypical Angina</option>
          <option value="2">2 = Non-anginal Pain</option>
          <option value="3">3 = Asymptomatic</option>
        </select>
      </div>

      <div class="col-md-4">
        <label>Resting Blood Pressure (mm Hg)</label>
        <input type="number" name="trestbps" class="form-control" required>
      </div>

      <div class="col-md-4">
        <label>Serum Cholesterol (mg/dl)</label>
        <input type="number" name="chol" class="form-control" required>
      </div>

      <div class="col-md-4">
        <label>Fasting Blood Sugar > 120 mg/dl</label>
        <select class="form-select" name="fbs">
          <option value="1">1 = Yes</option>
          <option value="0">0 = No</option>
        </select>
      </div>

      <div class="col-md-4">
        <label>Resting Electrocardiographic Results</label>
        <select class="form-select" name="restecg">
          <option value="0">0 = Normal</option>
          <option value="1">1 = ST-T Abnormality</option>
          <option value="2">2 = Left Ventricular Hypertrophy</option>
        </select>
      </div>

      <div class="col-md-4">
        <label>Maximum Heart Rate Achieved</label>
        <input type="number" name="thalach" class="form-control" required>
      </div>

      <div class="col-md-4">
        <label>Exercise Induced Angina</label>
        <select class="form-select" name="exang">
          <option value="1">1 = Yes</option>
          <option value="0">0 = No</option>
        </select>
      </div>

      <div class="col-md-4">
        <label>ST Depression Induced by Exercise (Oldpeak)</label>
        <input type="number" step="any" name="oldpeak" class="form-control" required>
      </div>

      <div class="col-md-4">
        <label>Slope of the ST Segment</label>
        <select class="form-select" name="slope">
          <option value="0">0 = Upsloping</option>
          <option value="1">1 = Flat</option>
          <option value="2">2 = Downsloping</option>
        </select>
      </div>

      <div class="col-md-4">
        <label>Major Vessels Colored by Fluoroscopy</label>
        <input type="number" name="ca" class="form-control" min="0" max="3" required>
      </div>

      <div class="col-md-4">
        <label>Thalassemia Type</label>
        <select class="form-select" name="thal">
          <option value="1">1 = Normal</option>
          <option value="2">2 = Fixed Defect</option>
          <option value="3">3 = Reversible Defect</option>
        </select>
      </div>

      <div class="text-center mt-4">
        <button type="submit" class="btn btn-primary">Predict</button>
        <a href="/home" class="btn btn-secondary ms-2">Back to Home</a>
      </div>
    </form>

    {% if result %}
      <hr>
      <h4 class="text-center mt-4 text-white">Model Predictions:</h4>
      <ul class="mt-3">
        {% for model, vote in votes.items() %}
          <li><b>{{ model }}</b>: {{ 'Heart Disease' if vote else 'No Heart Disease' }}</li>
        {% endfor %}
      </ul>

      <div class="alert alert-info mt-4 text-center">
        <b>🧠 Combined Ensemble Prediction:</b> {{ result }}
      </div>
    {% endif %}
  </div>
</body>
</html>
