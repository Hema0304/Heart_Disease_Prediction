<!DOCTYPE html>
<html lang="en">
<head>
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #2e7d32, #ff9800); /* Green to Orange */
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      animation: fadeIn 1s ease;
      margin: 0;
    }

    .navbar {
      background-color: #1b5e20; /* Dark Green */
      padding: 1rem;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 85vh;
      text-align: center;
    }

    h2 {
      font-weight: 600;
      margin-bottom: 30px;
    }

    .btn-lg {
      min-width: 260px;
      padding: 15px 30px;
      font-size: 1.1rem;
      font-weight: 500;
      transition: transform 0.3s ease, background-color 0.3s ease;
    }

    .btn-primary {
      background-color: #43a047; /* Medium Green */
      border: none;
    }

    .btn-primary:hover {
      background-color: #2e7d32; /* Darker Green */
      transform: scale(1.05);
    }

    .btn-secondary {
      background-color: #f57c00; /* Deep Orange */
      border: none;
    }

    .btn-secondary:hover {
      background-color: #ef6c00; /* Darker Orange */
      transform: scale(1.05);
    }

    .btn-danger {
      background-color: #d84315; /* Reddish-Orange for logout */
      border: none;
    }

    .btn-danger:hover {
      background-color: #bf360c;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark justify-content-end">
    <a href="/logout" class="btn btn-danger me-3">Logout</a>
  </nav>

  <div class="container">
    <h2>🏠 Welcome to Heart Disease Prediction</h2>
    <a href="/manual" class="btn btn-primary btn-lg m-3">Manual Individual Prediction</a>
    <a href="/evaluate" class="btn btn-secondary btn-lg m-3">Evaluate Test Set</a>
  </div>
</body>
</html>
