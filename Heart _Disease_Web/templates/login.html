<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #2e7d32, #ff9800); /* Green to Orange */
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      animation: fadeIn 1s ease;
    }

    .login-card {
      max-width: 400px;
      background-color: #ffffff;
      color: #333;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
    }

    h4 {
      text-align: center;
      font-weight: 600;
      color: #2e7d32; /* Green title */
    }

    .btn-primary {
      background-color: #43a047; /* Medium Green */
      border: none;
    }

    .btn-primary:hover {
      background-color: #2e7d32; /* Darker Green */
    }

    .alert-success {
      background-color: #66bb6a; /* Light green success */
      color: #fff;
    }

    .alert-danger {
      background-color: #e64a19; /* Reddish-orange for errors */
      color: #fff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h4 class="mb-4">🔐 Login</h4>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="mb-3">
        <label>Username</label>
        <input type="text" name="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button class="btn btn-primary w-100">Login</button>
    </form>
  </div>
</body>
</html>
